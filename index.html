<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사다리 예측 결과</title>
  <style>
    body { font-family: sans-serif; padding: 2em; background: #f9f9f9; }
    .card { background: #fff; padding: 1em; margin: 1em 0; border-radius: 8px; box-shadow: 0 0 5px #ccc; }
    .card h2 { margin: 0 0 10px; }
  </style>
</head>
<body>
  <h1>🔮 사다리 예측 결과</h1>
  <div class="card" id="prediction-box">
    <h2>예측 회차: <span id="round">...</span></h2>
    <p>Top3 예측 결과:</p>
    <ol id="results">
      <li>...</li>
      <li>...</li>
      <li>...</li>
    </ol>
  </div>

  <script>
    fetch("/predict")
      .then(res => res.json())
      .then(data => {
        document.getElementById("round").innerText = data["예측회차"] ?? data["회차"] ?? "...";
        const resultList = document.getElementById("results");
        resultList.innerHTML = "";
        const preds = data["예측값"] || data["예측"] || ["❌ 없음", "❌ 없음", "❌ 없음"];
        if (Array.isArray(preds)) {
          preds.forEach(val => {
            const li = document.createElement("li");
            li.textContent = val;
            resultList.appendChild(li);
          });
        } else {
          const li = document.createElement("li");
          li.textContent = preds;
          resultList.appendChild(li);
        }
      })
      .catch(err => {
        document.getElementById("results").innerHTML = "<li>❌ 네트워크 오류</li>";
      });
  </script>
</body>
</html>
