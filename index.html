<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사다리 블럭 예측 결과</title>
  <style>
    body {
      font-family: "Noto Sans KR", sans-serif;
      background: #f4f7ff;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .section {
      margin-bottom: 2rem;
    }
    .card-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .card {
      background: #fff;
      padding: 1rem;
      border-radius: 0.8rem;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      width: 240px;
    }
    .card h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
    }
    .value {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      background: #e1edff;
      padding: 0.3rem 0.5rem;
      display: inline-block;
      border-radius: 0.4rem;
    }
    .note {
      font-size: 0.85rem;
      color: #555;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <h1>🔮 사다리 블럭 예측 결과 (3줄/4줄)</h1>

  <div id="results"></div>

  <script>
    const modes = [
      "3block_orig", "3block_flip_full", "3block_flip_start", "3block_flip_odd_even",
      "4block_orig", "4block_flip_full", "4block_flip_start", "4block_flip_odd_even"
    ];

    const modeTitles = {
      "3block": "3줄 블럭",
      "4block": "4줄 블럭"
    };

    const transformLabel = {
      "orig": "원본",
      "flip_start": "시작점 변형",
      "flip_odd_even": "홀짝 변형",
      "flip_full": "완전 대칭"
    };

    const getModeKey = (mode) => mode.split("_")[0];

    function createCard(mode, data) {
      const card = document.createElement("div");
      card.className = "card";

      const mkey = getModeKey(mode);
      const typeKey = mode.split("_").slice(1).join("_");

      const label = document.createElement("h3");
      label.textContent = `${modeTitles[mkey]} (${transformLabel[typeKey]}) (회차 ${data["예측회차"]})`;
      card.appendChild(label);

      const value = document.createElement("div");
      value.className = "value";
      value.textContent = data["예측값"] || "❌ 없음";
      card.appendChild(value);

      const note = document.createElement("div");
      note.className = "note";
      note.textContent = `블럭: ${data["블럭"]}`;
      card.appendChild(note);

      const match = document.createElement("div");
      match.className = "note";
      match.textContent = `매칭순번: ${data["매칭순번"]}`;
      card.appendChild(match);

      return card;
    }

    async function loadResults() {
      const resultContainer = document.getElementById("results");
      const sectionMap = {};

      for (const mode of modes) {
        const res = await fetch(`/predict?mode=${mode}`);
        const data = await res.json();

        const sectionKey = getModeKey(mode);
        if (!sectionMap[sectionKey]) {
          const section = document.createElement("div");
          section.className = "section";

          const title = document.createElement("h2");
          title.textContent = modeTitles[sectionKey];
          section.appendChild(title);

          const group = document.createElement("div");
          group.className = "card-group";
          section.appendChild(group);

          resultContainer.appendChild(section);
          sectionMap[sectionKey] = group;
        }

        sectionMap[sectionKey].appendChild(createCard(mode, data));
      }
    }

    loadResults();
  </script>
</body>
</html>
